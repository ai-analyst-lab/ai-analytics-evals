# Held-out gold suite for NovaMart. HIDDEN FROM THE ANALYST: this file lives with the harness,
# NOT in the communal context repo. If the agent could read these answers it would cheat.
#
# Each case = a question + the SQL that computes the gold + the approved (blessed) query used for
# the query-similarity check. The VALUE is never stored; it is recomputed from the SQL at eval
# time against live data, so it cannot rot. The analyst is graded on (1) accuracy: its number vs
# the recomputed gold, and (2) query-similarity: its SQL vs approved_query.
#
# Every sql below was RUN LIVE on BOOTCAMP_DB.NOVAMART (Snowflake, BOOTCAMP_STUDENT read-only)
# on 2026-06-26 and confirmed to return a real number. Definitions used:
#   retention            = count_if(is_current)/count(*) from memberships
#   checkout conversion  = events-based: distinct purchase_complete sessions / distinct
#                          checkout_started sessions (NOT sessions.had_purchase)
# 47 cases (24 train / 23 test) spread across difficulty (easy/medium/hard) and type (single-table aggregate,
# join/fan-out-prone, definitional, time-windowed, ratio, distinct-count, multi-step).
