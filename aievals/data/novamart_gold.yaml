    split: train
    status: verified
    confidence: A
    verified_by: shane
    verified_at: 2026-06-27
    last_verified: 2026-07-08
    note: "Drifts: naive = completed only (gross) or all statuses; house = completed minus returned. Recomputed live 2026-07-08, matched to the cent. C2 tier-1: the bare net_revenue meaning contract targets THIS case."

  - question: "What was our net revenue after discounts and returns in 2024?"
    sql: "select sum(iff(status='completed',total_amount,0)) - sum(iff(status='returned',total_amount,0)) from orders where year(order_date)=2024"
    approved_query: "select sum(iff(status='completed',total_amount,0)) - sum(iff(status='returned',total_amount,0)) from orders where year(order_date)=2024"
    tables: [orders]
    difficulty: hard
    type: "definitional"
    split: train
    status: verified
    confidence: A
    verified_by: shane
    verified_at: 2026-07-08
    last_verified: 2026-07-08
    rel_tol: 0.002
    note: >-
      C2 tier-2. The question wording invites re-subtracting discount_amount, but total_amount is
      already net of the discount (subtotal - discount_amount + shipping_amount). Correct = completed
      minus returned on total_amount AS-IS, 2024 window. Arc-tested 2026-07-08 (Opus, fresh blind runs):
      with the money columns documented in the semantic layer the double-subtract bait does NOT bite;
      the observed failure mode is mapping onto the adjacent total_revenue entry (completed-only,
      ignores returns, +6.33%); the net_revenue contract fixes it exact-gold 3/3.
      Value recomputed at grade time, never stored; verified live 2026-07-08. rel_tol 0.002
      fails every defensible wrong reading (nearest: subtotal basis at 0.40%, 2x margin).
      Promoted from novamart_gold_candidates.yaml (full wrong-reading spread documented there).

